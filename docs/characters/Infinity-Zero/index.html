<style>
.character-page {
  display: flex;
  flex-wrap: wrap;
  gap: 30px;
  align-items: flex-start;
}

.infobox {
  width: 280px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
}

.infobox-header {
  background: var(--bg-card);
  padding: 12px 15px;
  border-bottom: 1px solid var(--border-color);
}

.infobox-header h1 {
  font-size: 1.2em;
  font-weight: 600;
  margin: 0;
  border: none;
  padding: 0;
}

.infobox-image {
  padding: 10px;
  text-align: center;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-color);
}

.infobox-image img {
  max-width: 100%;
  max-height: 250px;
  border-radius: 4px;
}

.infobox-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9em;
}

.infobox-table th,
.infobox-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-color);
  text-align: left;
}

.infobox-table th {
  background: var(--bg-card);
  font-weight: 500;
  color: var(--text-secondary);
  width: 40%;
}

.infobox-table tr:last-child th,
.infobox-table tr:last-child td {
  border-bottom: none;
}

.article-body {
  flex: 1;
  min-width: 0;
}

.article-body .lead {
  font-size: 1.1em;
  color: var(--text-secondary);
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid var(--border-color);
}

.article-body p {
  margin-bottom: 15px;
}

.article-body h2 {
  font-size: 1.3em;
  margin: 25px 0 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border-color);
}

.article-body h3 {
  font-size: 1.1em;
  margin: 20px 0 8px;
}

.article-body ul,
.article-body ol {
  margin: 15px 0;
  padding-left: 25px;
}

.article-body li {
  margin-bottom: 6px;
}

.section {
  margin-top: 30px;
  padding-top: 20px;
  border-top: 1px solid var(--border-color);
}

.link-list {
  list-style: none;
  padding: 0;
}

.link-list li {
  padding: 6px 0;
}

.link-list li::before {
  content: "→ ";
  color: var(--text-secondary);
}

.empty {
  color: var(--text-secondary);
  font-style: italic;
}

@media (max-width: 700px) {
  .character-page {
    flex-direction: column;
  }

  .infobox {
    width: 100%;
  }
}
</style>
