<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUGEN OOTQ Ranking Wiki</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="github-markdown.css">
  <script src="i18n.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="" class="logo">
        <span>🎮</span>
        <span>MUGEN OOTQ Wiki</span>
      </a>
      <div class="header-controls">
        <button id="themeToggle" class="btn" aria-label="Toggle theme">🌙</button>
        <select id="langSelect" class="lang-select">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
        </select>
      </div>
    </div>
  </header>

  <nav class="container">
    <div style="padding: 10px 0; border-bottom: 1px solid var(--border-color); display: flex; gap: 20px; align-items: center;">
      <div style="flex: 1;">
        <a href="" data-i18n="home">首页</a>
        <a href="characters/" data-i18n="characters" style="margin-left: 15px;">角色</a>
        <a href="glossary/" data-i18n="glossary" style="margin-left: 15px;">术语</a>
      </div>
      <a href="https://github.com/mugen-community/MUGEN-OOTQ-Ranking-Wiki/issues/new?template=character_submission.md" class="btn" style="padding: 6px 14px; font-size: 0.9em;" data-i18n="newEntry"><img src="github.svg" alt="" style="height:1em;vertical-align:middle;margin-right:4px">新建</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
  <h1>MUGEN OOTQ Ranking Wiki</h1>
  <p class="lead" data-i18n="homeLead">角色内容已重构为 GitHub Issue CMS。列表、预览、详情统一在单页中。</p>
</div>

<section class="section">
  <div class="card-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));">
    <a class="card" href="characters/">
      <h3 data-i18n="charDB">角色数据库</h3>
      <p data-i18n="charDBDesc">进入单页角色库，按 Issue 实时读取数据，支持搜索、预览、详情。</p>
    </a>
    <a class="card" href="glossary/">
      <h3 data-i18n="glossary">术语表</h3>
      <p><span data-i18n="glossaryDesc">当前术语条目数量：</span><strong>0</strong></p>
    </a>
  </div>
</section>

  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 MUGEN OOTQ Ranking Wiki</p>
    </div>
  </footer>
</body>
</html>
