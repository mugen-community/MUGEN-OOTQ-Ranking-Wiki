<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glossary</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../github-markdown.css">
  <script src="../i18n-data.js"></script>
  <script src="../i18n.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="../" class="logo">
        <span>🎮</span>
        <span data-i18n="siteName">MUGEN OOTQ Wiki</span>
      </a>
      <div class="header-controls">
        <button id="themeToggle" class="btn" aria-label="Toggle theme">🌙</button>
        <select id="langSelect" class="lang-select"></select>
        <script>
        (function(){
          var names = window.__LANG_NAMES || {};
          var langs = window.__LANGS || ['zh','en','ja'];
          var sel = document.getElementById('langSelect');
          if (!sel) return;
          for (var i = 0; i < langs.length; i++) {
            var o = document.createElement('option');
            o.value = langs[i];
            o.textContent = names[langs[i]] || langs[i];
            sel.appendChild(o);
          }
        })();
        </script>
      </div>
    </div>
  </header>

  <nav class="container">
    <div style="padding: 10px 0; border-bottom: 1px solid var(--border-color); display: flex; gap: 20px; align-items: center;">
      <div style="flex: 1;">
        <a href="../" data-i18n="home">首页</a>
        <a href="../characters/" data-i18n="characters" style="margin-left: 15px;">角色</a>
        <a href="../glossary/" data-i18n="glossary" style="margin-left: 15px;">术语</a>
      </div>
      <a href="https://github.com/mugen-community/MUGEN-OOTQ-Ranking-Wiki/issues/new?template=character_submission.md" class="btn" style="padding: 6px 14px; font-size: 0.9em;" data-i18n="newEntry"><img src="../github.svg" alt="" style="height:1em;vertical-align:middle;margin-right:4px">新建</a>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
  <h1 data-i18n="glossary">术语</h1>
  <p class="lead" data-i18n="noContent">所有已收录术语</p>
</div>



<div class="list-container" id="listContainer" style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">
  
  
    <div class="empty-state">
      <p data-i18n="noContent">暂无内容</p>
    </div>
  
</div>

<style>
.tag-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 20px 0;
  align-items: center;
}

.tag-btn {
  padding: 6px 14px;
  border: 1px solid var(--border-color);
  border-radius: 16px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 0.9em;
  transition: all 0.2s;
}

.tag-btn:hover {
  border-color: var(--link-color);
}

.tag-btn.active {
  background: var(--link-color);
  color: white;
  border-color: var(--link-color);
}

.list-container .card {
  display: flex;
  flex-direction: column;
  padding: 16px;
}

.list-container .card.hidden {
  display: none !important;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 6px;
}

.card-title {
  margin: 0;
  color: var(--link-color);
  font-size: 1.1em;
}

.card-summary {
  color: var(--text-secondary);
  font-size: 0.95em;
  margin: 0;
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.list-container .tags {
  margin-top: 8px;
}
</style>

<script>
let currentTag = 'all';
let currentAct = 'all';
let currentTech = 'all';

document.querySelectorAll('#tagFilter .tag-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    console.log('Tag button clicked:', e.target.dataset.tag);
    currentTag = btn.dataset.tag;
    document.querySelectorAll('#tagFilter .tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCards();
  });
});

document.querySelectorAll('#activationFilter .tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentAct = btn.dataset.act;
    document.querySelectorAll('#activationFilter .tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCards();
  });
});

document.querySelectorAll('#techFilter .tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTech = btn.dataset.tech;
    document.querySelectorAll('#techFilter .tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCards();
  });
});

function filterCards() {
  const cards = document.querySelectorAll('#listContainer .card');
  console.log('Filtering', cards.length, 'cards', 'currentTag:', currentTag, 'currentAct:', currentAct, 'currentTech:', currentTech);
  cards.forEach(card => {
    const tags = JSON.parse(card.dataset.tags || '[]').map(t => t.toLowerCase());
    const acts = JSON.parse(card.dataset.acts || '[]').map(a => a.toLowerCase());
    const techs = JSON.parse(card.dataset.techs || '[]').map(t => t.toLowerCase());
    const tagLower = currentTag.toLowerCase();
    const actLower = currentAct.toLowerCase();
    const techLower = currentTech.toLowerCase();
    const tagMatch = currentTag === 'all' || tags.includes(tagLower);
    const actMatch = currentAct === 'all' || acts.includes(actLower);
    const techMatch = currentTech === 'all' || techs.includes(techLower);
    const shouldHide = !(tagMatch && actMatch && techMatch);
    console.log('Card:', card.href, 'tags:', tags, 'tagMatch:', tagMatch, 'actMatch:', actMatch, 'techMatch:', techMatch, 'shouldHide:', shouldHide);
    card.classList.toggle('hidden', shouldHide);
  });
}
</script>
  </main>

  <footer>
    <div class="container">
      <p data-i18n="footer">&copy; 2026 MUGEN OOTQ Ranking Wiki</p>
    </div>
  </footer>
</body>
</html>
