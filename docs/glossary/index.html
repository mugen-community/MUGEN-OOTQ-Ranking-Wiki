<div class="list-container" id="listContainer" style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;">

<style>
.tag-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 20px 0;
  align-items: center;
}

.tag-btn {
  padding: 6px 14px;
  border: 1px solid var(--border-color);
  border-radius: 16px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 0.9em;
  transition: all 0.2s;
}

.tag-btn:hover {
  border-color: var(--link-color);
}

.tag-btn.active {
  background: var(--link-color);
  color: white;
  border-color: var(--link-color);
}

.list-container .card {
  display: flex;
  flex-direction: column;
  padding: 16px;
}

.list-container .card.hidden {
  display: none;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 6px;
}

.card-title {
  margin: 0;
  color: var(--link-color);
  font-size: 1.1em;
}

.card-summary {
  color: var(--text-secondary);
  font-size: 0.95em;
  margin: 0;
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.list-container .tags {
  margin-top: 8px;
}
</style>

<script>
let currentTag = 'all';
let currentAct = 'all';
let currentTech = 'all';

document.querySelectorAll('#tagFilter .tag-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    console.log('Tag button clicked:', e.target.dataset.tag);
    currentTag = btn.dataset.tag;
    document.querySelectorAll('#tagFilter .tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCards();
  });
});

document.querySelectorAll('#activationFilter .tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentAct = btn.dataset.act;
    document.querySelectorAll('#activationFilter .tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCards();
  });
});

document.querySelectorAll('#techFilter .tag-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTech = btn.dataset.tech;
    document.querySelectorAll('#techFilter .tag-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCards();
  });
});

function filterCards() {
  const cards = document.querySelectorAll('#listContainer .card');
  console.log('Filtering', cards.length, 'cards', 'currentTag:', currentTag, 'currentAct:', currentAct, 'currentTech:', currentTech);
  cards.forEach(card => {
    const tags = JSON.parse(card.dataset.tags || '[]').map(t => t.toLowerCase());
    const acts = JSON.parse(card.dataset.acts || '[]').map(a => a.toLowerCase());
    const techs = JSON.parse(card.dataset.techs || '[]').map(t => t.toLowerCase());
    const tagMatch = currentTag === 'all' || tags.includes(currentTag.toLowerCase());
    const actMatch = currentAct === 'all' || acts.includes(currentAct.toLowerCase());
    const techMatch = currentTech === 'all' || techs.includes(currentTech.toLowerCase());
    const shouldHide = !(tagMatch && actMatch && techMatch);
    card.classList.toggle('hidden', shouldHide);
  });
}
</script>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 MUGEN OOTQ Ranking Wiki</p>
    </div>
  </footer>
