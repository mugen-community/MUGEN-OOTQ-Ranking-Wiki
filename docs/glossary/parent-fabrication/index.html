  <h1 data-i18n="title">亲捏造</h1>

  
    <div class="info-box">
      <p data-i18n="summary">直接操作内存地址的攻击技术</p>
    </div>
  

  <div class="content-body">
    <div data-i18n="description">
      <p>亲捏造是MUGEN中通过Parent内存地址作为跳板，直接记录和映射主程序地址以任意修改内存的技术。</p><h2>原理</h2><p>通过修改Alive、LIFE等关键内存地址实现直死、强制伤害等效果。</p><h2>变量扩张型亲捏造</h2><p>由sinoiha发明，启动后调用API申请虚拟内存空间修改源代码扩展游戏变量，将内存地址映射到扩展的游戏变量上直接操作。</p>
    </div>
  </div>
